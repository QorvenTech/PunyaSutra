<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login or Signup - PunyaSutra</title>
  <meta name="description" content="Login or create your PunyaSutra account with email or Google to book pujas and view your booking history." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="./assets/brand/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="./assets/brand/favicon-32.png" />
  <link rel="apple-touch-icon" href="./assets/brand/apple-touch-icon.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./"><img class="brandLogo" src="./assets/brand/punyasutra-logo.png" alt="PunyaSutra logo" /><span><strong>PunyaSutra</strong><small>Your Sankalp. Our Seva. Divine Connection.</small></span></a>
    <nav><a href="./">Home</a><a href="./how-it-works.html">How It Works</a><a href="./track.html">Track Puja</a><a href="./bookings.html">My Bookings</a><span class="langControls" aria-label="Language selector"><button class="langToggle" type="button" data-lang-toggle="en" aria-label="English language">EN</button><button class="langToggle" type="button" data-lang-toggle="hi" aria-label="Hindi language">हिं</button></span></nav>
  </header>
  <main class="authShell">
    <section class="panel authPanel form">
      <p class="eyebrow">Account access</p>
      <h2>Email or Google Login</h2>
      <button id="googleButton" class="googleButton wide" type="button"><span>G</span> Continue with Google</button>
      <div class="divider"><span>or continue with email</span></div>
      <div class="authSwitch"><button id="loginTab" class="active" type="button">Login</button><button id="signupTab" type="button">Signup</button></div>
      <form id="authForm" class="form">
        <label id="nameLabel" class="hidden">Name<input name="name" placeholder="Your full name" /></label>
        <label>Email<input name="email" type="email" autocomplete="email" required /></label>
        <label>Password<input name="password" type="password" autocomplete="current-password" required minlength="6" /></label>
        <button id="authButton" class="primary wide" type="submit">Login</button>
        <p id="authMessage" class="message"></p>
      </form>
    </section>
  </main>
  
  <script type="module" src="./i18n/i18n.js?v=20260711"></script>
  <script type="module" src="./auth.js"></script>
</body>
</html>
